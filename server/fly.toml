# Fly.io 設定（東京リージョン・ゼロスケール運用）
# - primary_region = "nrt"（東京）で操作ラグを最小化
# - min_machines_running = 0 ＋ auto_stop_machines = "stop" でアイドル時は完全停止＝ほぼ無料
#   （アクセスが来ると auto_start で自動起動。起動は数秒）
# - Colyseus は部屋がプロセス内に存在するため、必ず "1台のみ" で運用すること（fly scale count 1）
app = "reihou-server"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = "stop"   # アイドルで完全停止（コスト最小）。即時復帰を優先するなら "suspend"
  auto_start_machines = true     # アクセスで自動起動
  min_machines_running = 0       # 誰も居なければ0台＝ほぼ無料

  # 起動完了(=接続受付OK)を Fly に知らせるヘルスチェック
  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "4s"
    grace_period = "10s"

# リアルタイム30Hzの権威サーバー。256MBだとGC停止で固定ステップを取りこぼし
# プレイヤーが巻き戻る(ラバーバンド)ため、RAMを512MB(元の2倍)に増やしてGC停止を回避。
# CPUは1xで十分（1部屋のsimは軽い）。巻き戻りが再発したらRAM/CPUを再増強。
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# 自動デプロイ動作確認用（変更してpushするとFlyへ自動デプロイ）
