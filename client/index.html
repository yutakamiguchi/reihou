<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- ホーム画面に追加で全画面起動（URLバー/タブを消す）。iOS Safari 用 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Unspottable" />
  <meta name="theme-color" content="#2a2f3a" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <title>Unspottable Web</title>
  <style>
    html, body { margin: 0; padding: 0; background: #2a2f3a; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; height: 100%;
      /* スマホでのスクロール/長押し選択/タップ拡大を抑止し、ゲーム操作に集中させる */
      touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none; }
    body {
      box-sizing: border-box;
      height: 100dvh;
      /* ノッチ/ホームインジケータ等のセーフエリアぶんだけ内側に寄せ、キャンバス全体を安全領域に収める */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #game { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
