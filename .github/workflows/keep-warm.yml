name: keep-warm

# Render 無料プランは15分アイドルでスリープし、復帰に約1〜2分かかる。
# 10分ごとに /health を叩いてスリープを防ぎ、コールドスタートを起こさせない。
# （公開リポジトリなので Actions 実行は無料・無制限）

on:
  schedule:
    - cron: "*/10 * * * *" # 10分ごと（GitHubの都合で多少遅延することがある）
  workflow_dispatch: {}      # 手動実行も可

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server health
        run: |
          echo "Pinging server (cold start なら最大2分待つ)..."
          curl -fsS -m 150 -w "\nHTTP %{http_code}  time=%{time_total}s\n" \
            https://unspottable-web.onrender.com/health
